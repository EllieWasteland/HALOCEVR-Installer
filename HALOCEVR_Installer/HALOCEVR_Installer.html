<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNSC | HALO CE VR INSTALLER</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --bg-deep: #050505;
            --halo-white: #ffffff;
            --halo-grey: #a1a1aa;
            --terminal-green: #a8ffaa;
            --terminal-red: #ff5555;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--halo-white);
            font-family: 'Barlow', 'Rajdhani', sans-serif;
            overflow: hidden; margin: 0; height: 100vh; width: 100vw;
            user-select: none; cursor: default;
        }

        .font-tech { font-family: 'Rajdhani', monospace; font-weight: 600; }

        #video-bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -10; background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); 
        }

        #bg-image {
            width: 100%; height: 100%; 
            background-size: cover; background-position: center;
            filter: brightness(0.25) desaturate(0.6) contrast(1.2);
            transition: filter 1s ease;
        }

        .video-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at left, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.95) 100%); z-index: 1;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 3px; z-index: 90; pointer-events: none; opacity: 0.15;
        }

        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 89; opacity: 0.03; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='1'/%3E%3C/svg%3E");
        }

        @keyframes slideInRight { 0% { opacity: 0; transform: translateX(30px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes pingSlow { 75%, 100% { transform: scale(2); opacity: 0; } }
        @keyframes pingSlower { 75%, 100% { transform: scale(2.5); opacity: 0; } }
        @keyframes reactorSurge {
            0% { transform: scale(1); opacity: 0.9; border-width: 2px; border-color: white; }
            100% { transform: scale(50); opacity: 0; border-width: 0px; border-color: white; }
        }
        
        .anim-slide-in { animation: slideInRight 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 100ms; }
        .delay-2 { animation-delay: 200ms; }
        .delay-3 { animation-delay: 300ms; }
        .animate-ping-slow { animation: pingSlow 3s cubic-bezier(0, 0, 0.2, 1) infinite; }
        .animate-ping-slower { animation: pingSlower 4s cubic-bezier(0, 0, 0.2, 1) infinite; animation-delay: 1s; }

        .reactor-mode .ripple-ring { animation: reactorSurge 0.6s cubic-bezier(0.1, 0.5, 0.1, 1) infinite !important; }
        .reactor-mode .ripple-ring:nth-child(2) { animation-delay: 0.0s !important; }
        .reactor-mode .ripple-ring:nth-child(3) { animation-delay: 0.1s !important; }
        .reactor-mode .ripple-ring:nth-child(4) { animation-delay: 0.2s !important; }
        .reactor-mode .ripple-ring:nth-child(5) { animation-delay: 0.3s !important; }
        .reactor-mode .ripple-ring:nth-child(6) { animation-delay: 0.4s !important; }
        .reactor-mode .ripple-ring:nth-child(7) { animation-delay: 0.5s !important; }

        .step-title {
            font-size: 3.5rem; font-weight: 300; margin-bottom: 0.5rem; line-height: 1;
            color: #fff; text-transform: uppercase; letter-spacing: 0.05em;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .step-desc {
            font-size: 1rem; font-weight: 300; color: var(--halo-grey);
            margin-bottom: 2rem; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 1rem;
        }

        .btn-action {
            background: var(--halo-white); color: #000;
            font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1rem;
            padding: 0.8rem 3rem; border: none; cursor: pointer;
            transition: transform 0.2s; display: flex; align-items: center; justify-content: center;
            text-transform: uppercase; letter-spacing: 0.1em;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        .btn-action:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(255,255,255,0.4); }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-ghost {
            background: transparent; color: var(--halo-white);
            border: 1px solid rgba(255,255,255,0.3); padding: 0.7rem 1.5rem;
            cursor: pointer; font-family: 'Rajdhani', monospace; text-transform: uppercase;
            font-size: 0.8rem; display: flex; align-items: center; gap: 8px; transition: all 0.3s;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); border-color: white; }
        
        .btn-cancel {
            background: rgba(255,255,255,0.05); color: var(--halo-white);
            font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.8rem;
            padding: 0.6rem 1.5rem; border: 1px solid rgba(255,255,255,0.2); cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
            text-transform: uppercase; letter-spacing: 0.1em;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        .btn-cancel:hover {
            background: rgba(255, 85, 85, 0.15); border-color: var(--terminal-red); color: var(--terminal-red);
            transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 85, 85, 0.2);
        }

        .btn-lang {
            width: 100%; text-align: left; padding: 1.5rem;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .btn-lang:hover { background: rgba(255,255,255,0.15); border-color: var(--halo-white); }

        .main-layout {
            display: grid; grid-template-columns: 1fr 0.8fr; height: 100vh;
            opacity: 0; pointer-events: none; transition: opacity 1s ease; position: relative;
        }
        .panel-content {
            padding: 4rem 6rem; display: flex; flex-direction: column; justify-content: center;
            background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); z-index: 10;
        }
        .panel-visual { display: flex; align-items: center; justify-content: center; position: relative; }

        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease;
        }
        .log-line {
            color: var(--halo-white); font-size: 0.8rem; width: 100%;
            margin-bottom: 5px; opacity: 0; animation: slideInRight 0.2s forwards;
        }

        .terminal-box {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            font-family: 'Share Tech Mono', monospace; padding: 1rem; margin-top: 1rem;
            height: 120px; overflow-y: auto; font-size: 0.8rem; color: #888;
            display: flex; flex-direction: column-reverse;
        }
        
        .progress-bar-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); margin-top: 10px; }
        .progress-bar-fill {
            height: 100%; width: 0%; background: var(--halo-white);
            box-shadow: 0 0 10px var(--halo-white); transition: width 0.3s ease;
        }

        /* CUSTOM MODAL OVERLAY */
        #custom-modal {
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        #custom-modal.show {
            opacity: 1;
            pointer-events: all;
        }
    </style>
</head>

                modal_launcher_desc: "<span class='text-terminal-red font-bold'>You MUST start the game using the Launcher</span>. Otherwise, the Flood will appear at your bedroom door (just kidding, but it prevents weird bugs that the launcher fixes).",
                modal_launcher_btn: "EXIT TO DESKTOP",
                modal_refined_title: "WARNING: MULTIPLAYER",
                modal_refined_desc: "If you install Halo Refined, you will highly likely <span class='text-terminal-red font-bold'>lose access to multiplayer</span> due to modified map files. Do you wish to continue?",

                modal_btn_no: "CANCEL"

        };

        const FLOW = ['splash', 'folder', 'credits', 'core', 'chimera', 'laa', 'audio', 'refined', 'shortcut', 'final'];
        let currentLang = 'en';
        let currentStepKey = 'language';
        let isProcessing = false;

        window.addEventListener('load', runBootSequence);

        function runBootSequence() {
            const logs = ["INITIALIZING KERNEL...", "CHECKING INTEGRITY...", "LOADING INTERFACE MODULES...", "SYSTEM READY."];
            const logContainer = document.getElementById('boot-logs');
            let delay = 0;

            logs.forEach((log, i) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'log-line';
                    div.innerText = `> ${log}`;
                    logContainer.appendChild(div);
                    if(i === logs.length - 1) setTimeout(revealInterface, 800);
                }, delay);
                delay += 300;
            });
        }

        function revealInterface() {
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('main-interface').style.opacity = '1';
                document.getElementById('main-interface').style.pointerEvents = 'all';
                renderStep('language');
            }, 800);
        }

        async function transitionContent(updateFunction) {
            const container = document.getElementById('content-container');
            const visual = document.getElementById('visual-icon-wrapper');

            if (container.innerHTML.trim() !== "") {
                container.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                container.style.opacity = '0';
                container.style.transform = 'translateX(-30px)';

                if(visual) {
                    visual.style.transition = 'all 0.3s ease';
                    visual.style.opacity = '0';
                    visual.style.transform = 'scale(0.8)';
                }
                await new Promise(r => setTimeout(r, 300));
            }

            updateFunction();

            container.style.transition = 'none';
            container.style.opacity = '1'; 
            
            if(visual) {
                visual.style.transition = 'all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)';
                visual.style.opacity = '1';
                visual.style.transform = 'scale(1)';
            }
        }

        function setLanguage(lang) {
            currentLang = lang;
            
            const cancelText = document.getElementById('btn-cancel-text');
            if (cancelText) cancelText.innerText = i18n[lang].btn_cancel;

            const mainInt = document.getElementById('main-interface');
            const introScreen = document.getElementById('intro-screen');
            const introVisual = document.getElementById('intro-visual');
            const introIcon = document.getElementById('intro-icon');
            const bgImage = document.getElementById('bg-image');

            mainInt.style.opacity = '0';
            mainInt.style.pointerEvents = 'none';
            introScreen.classList.remove('hidden');

            setTimeout(() => {
                introScreen.style.opacity = '1';
                
                setTimeout(() => {
                    introVisual.classList.add('reactor-mode');
                    introIcon.classList.add('animate-pulse');
                    introIcon.style.color = 'white';
                    bgImage.style.filter = 'brightness(0.5) desaturate(0.4) contrast(1.2)';

                    setTimeout(() => {
                        introScreen.style.opacity = '0';
                        transitionContent(() => renderStep('splash'));
                        
                        setTimeout(() => {
                            introScreen.classList.add('hidden');
                            mainInt.style.opacity = '1';
                            mainInt.style.pointerEvents = 'all';
                            introVisual.classList.remove('reactor-mode');
                        }, 1000);
                    }, 1500);
                }, 500);
            }, 50);
        }

        function openUrl(url) {
            if (window.pywebview) {
                window.pywebview.api.open_url(url);
            } else {
                window.open(url, '_blank');
            }
        }

        // LOADER DE EXTRACCIÓN 
        function showExtractionLoader(show) {
            const overlay = document.getElementById('extraction-overlay');
            if (show) {
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
            }
        }

        // SISTEMA DE MODALES PERSONALIZADOS
        function showCustomModal(title, desc, confirmText, cancelText, onConfirm, onCancel, iconClass = "ph-warning text-terminal-red") {
            const modal = document.getElementById('custom-modal');
            const modalBox = document.getElementById('modal-box');
            const icon = document.getElementById('modal-icon');
            
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerHTML = desc;
            
            icon.className = `ph ${iconClass} text-3xl`;

            const btnConfirm = document.getElementById('modal-btn-confirm');
            const btnCancel = document.getElementById('modal-btn-cancel');
            
            btnConfirm.innerText = confirmText || 'OK';
            btnConfirm.onclick = () => {
                modal.classList.remove('show');
                modalBox.classList.remove('scale-100');
                modalBox.classList.add('scale-95');
                setTimeout(() => {
                    if(onConfirm) onConfirm();
                }, 300); // Wait for transition
            };

            if (cancelText) {
                btnCancel.innerText = cancelText;
                btnCancel.classList.remove('hidden');
                btnCancel.onclick = () => {
                    modal.classList.remove('show');
                    modalBox.classList.remove('scale-100');
                    modalBox.classList.add('scale-95');
                    setTimeout(() => {
                        if(onCancel) onCancel();
                    }, 300);
                };
            } else {
                btnCancel.classList.add('hidden');
            }

            modal.classList.add('show');
            setTimeout(() => {
                modalBox.classList.remove('scale-95');
                modalBox.classList.add('scale-100');
            }, 10);
        }


        function renderStep(key) {
            currentStepKey = key;
            const container = document.getElementById('content-container');
            const visualIcon = document.getElementById('visual-icon');

            if (key === 'language') {
                visualIcon.className = `ph ph-globe text-[120px] text-white anim-slide-in`;
                container.innerHTML = `
                    <div class="anim-slide-in delay-1">
                        <h2 class="text-white/60 font-tech text-sm tracking-[0.4em] mb-2 uppercase">INITIAL SETUP</h2>
                        <h1 class="step-title">LANGUAGE</h1>
                        <div class="h-[2px] w-24 bg-white mb-6 shadow-[0_0_15px_white]"></div>
                        <p class="step-desc max-w-lg">Select your preferred language / Seleccione su idioma.</p>
                    </div>
                    <div class="mt-8 flex flex-col gap-4 w-full max-w-sm anim-slide-in delay-2">
                        <button onclick="setLanguage('en')" class="btn-lang">
                            <span class="font-tech text-xl tracking-widest block">ENGLISH</span>
                            <span class="text-xs text-zinc-500">DEFAULT INTERFACE</span>
                        </button>
                        <button onclick="setLanguage('es')" class="btn-lang">
                            <span class="font-tech text-xl tracking-widest block">ESPAÑOL</span>
                            <span class="text-xs text-zinc-500">INTERFAZ EN ESPAÑOL</span>
                        </button>
                    </div>
                `;
                return;
            }

            if (key === 'final' && window.pywebview) {
                window.pywebview.api.generate_log(currentLang);
            }

            const text = i18n[currentLang];
            const meta = {
                splash: { icon: "ph-fingerprint", action: null },
                folder: { icon: "ph-folder-notch-open", action: "selectFolder" },
                credits: { icon: "ph-users", action: null },
                core: { icon: "ph-cube", action: "installCore", skip: false },
                chimera: { icon: "ph-aperture", action: "installChimera", skip: true },
                laa: { icon: "ph-memory", action: "installLAA", skip: true },
                audio: { icon: "ph-speaker-high", action: "installAudio", skip: true },
                refined: { icon: "ph-sparkle", action: "installRefined", skip: true },
                shortcut: { icon: "ph-desktop", action: "installShortcut", auto: true }, // Automatic phase
                final: { icon: "ph-check-circle", action: "finish" }
            };

            const data = meta[key];
            visualIcon.className = `ph ${data.icon} text-[120px] text-white anim-slide-in`;
            
            const title = text[`${key}_title`];
            const sub = text[`${key}_sub`];
            const desc = text[`${key}_desc`];
            const loadingTxt = text[`loading_${key}`] || "PROCESSING...";
            const isAuto = data.auto === true;

            let html = `
                <div class="anim-slide-in delay-1">
                    <h2 class="text-white/60 font-tech text-sm tracking-[0.4em] mb-2 uppercase">${sub}</h2>
                    <h1 class="step-title">${title}</h1>
                    <div class="h-[2px] w-24 bg-white mb-6 shadow-[0_0_15px_white]"></div>
                    <p class="step-desc max-w-lg">${desc}</p>
                </div>
            `;

            if (key === 'credits') {
                html += `
                    <div class="grid grid-cols-2 gap-3 w-full max-w-lg mb-8 anim-slide-in delay-2">
                        <div onclick="openUrl('https://github.com/LivingFray/HaloCEVR')" class="p-4 border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/30 transition-all cursor-pointer group rounded-sm">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-white font-tech text-lg">HaloCEVR</span>
                                <i class="ph ph-arrow-up-right text-white/30 group-hover:text-white transition-colors"></i>
                            </div>
                            <div class="text-white/50 text-xs">by LivingFray</div>
                        </div>
                        <div onclick="openUrl('https://github.com/SnowyMouse/chimera')" class="p-4 border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/30 transition-all cursor-pointer group rounded-sm">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-white font-tech text-lg">Chimera</span>
                                <i class="ph ph-arrow-up-right text-white/30 group-hover:text-white transition-colors"></i>
                            </div>
                            <div class="text-white/50 text-xs">by SnowyMouse</div>
                        </div>
                        <div onclick="openUrl('https://www.proxeninc.net/Halo/Refined/')" class="p-4 border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/30 transition-all cursor-pointer group rounded-sm">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-white font-tech text-lg">Halo Refined</span>
                                <i class="ph ph-arrow-up-right text-white/30 group-hover:text-white transition-colors"></i>
                            </div>
                            <div class="text-white/50 text-xs">by Proxeninc / Community</div>
                        </div>
                        <div onclick="openUrl('https://github.com/ThreeDeeJay/dsoal')" class="p-4 border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/30 transition-all cursor-pointer group rounded-sm">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-white font-tech text-lg">Audio 3D (DSOAL)</span>
                                <i class="ph ph-arrow-up-right text-white/30 group-hover:text-white transition-colors"></i>
                            </div>
                            <div class="text-white/50 text-xs">by ThreeDeeJay</div>
                        </div>
                    </div>
                    <div class="flex gap-4 anim-slide-in delay-3">
                        <button onclick="transitionContent(() => renderStep('core'))" class="btn-action w-full justify-center">${text.btn_thanks}</button>
                    </div>
                `;
                container.innerHTML = html;
                return;
            }

            html += `<div class="mt-8 flex gap-4 anim-slide-in delay-2">`;
            
            if (key === 'splash') {
                html += `<button onclick="transitionContent(() => renderStep('folder'))" class="btn-action group"><span>${text.btn_start}</span><i class="ph ph-caret-right ml-2 group-hover:translate-x-1 transition-transform"></i></button>`;
            } else if (key === 'folder') {
                html += `<div class="flex flex-col gap-4 w-full max-w-md"><button onclick="triggerPythonAction('selectFolder')" class="btn-action w-full">${text.btn_select}</button><div id="path-display" class="font-mono text-xs text-white/50 border border-white/10 p-2 hidden"></div></div>`;
            } else if (key === 'final') {
                html += `<button onclick="triggerPythonAction('close')" class="btn-action">${text.btn_close}</button>`;
            } else {
                if (!isAuto && !isProcessing) {
                    html += `<button id="btn-main-action" onclick="triggerPythonAction('${data.action}')" class="btn-action">${text.btn_install}</button>`;
                    if (data.skip) html += `<button onclick="skipStep('${key}')" class="btn-ghost">${text.btn_skip}</button>`;
                }
            }
            html += `</div>`;

            html += `
                <div id="processing-area" class="${isAuto ? '' : 'hidden'} mt-6 w-full max-w-md anim-slide-in">
                    <div class="flex justify-between items-end mb-1">
                        <span class="font-tech text-xs tracking-widest text-white/70 uppercase" id="loading-label">${loadingTxt}</span>
                        <span class="font-mono text-xs text-white" id="progress-text">0%</span>
                    </div>
                    <div class="progress-bar-container"><div id="progress-fill" class="progress-bar-fill"></div></div>
                    <div id="terminal-logs" class="terminal-box"><div class="text-white/30">> ${text.status_wait}</div></div>
                </div>
            `;

            container.innerHTML = html;

            if (isAuto) {
                isProcessing = true;
                setTimeout(() => triggerPythonAction(data.action), 1500);
            }
        }

        function executeRealAction(actionName) {
            isProcessing = true;
            const btnMain = document.getElementById('btn-main-action');
            if(btnMain) btnMain.parentElement.style.display = 'none';
            document.getElementById('processing-area').classList.remove('hidden');

            if (window.pywebview) {
                let stage = { installCore: 1, installChimera: 2, installLAA: 3, installAudio: 4, installRefined: 5, installShortcut: 6 }[actionName] || 0;
                window.pywebview.api.run_stage(stage);
            } else {
                simulateProgress();
            }
        }

        function triggerPythonAction(actionName) {
            const text = i18n[currentLang];

            // 1. POPUP DE CIERRE (Secuencia de 2 mensajes)
            if (actionName === 'close') {
                showCustomModal(
                    text.modal_vr_title, 
                    text.modal_vr_desc, 
                    text.modal_vr_btn, 
                    null, 
                    () => {
                        // Después de confirmar la advertencia de VR, mostramos la del Launcher
                        setTimeout(() => {
                            showCustomModal(
                                text.modal_launcher_title,
                                text.modal_launcher_desc,
                                text.modal_launcher_btn,
                                null,
                                () => {
                                    window.pywebview ? window.pywebview.api.quit_app() : window.close();
                                },
                                null,
                                "ph-rocket text-terminal-green"
                            );
                        }, 200);
                    },
                    null,
                    "ph-headset text-terminal-green"
                );
                return;
            }

            if (actionName === 'selectFolder') {
                if (window.pywebview) {
                    window.pywebview.api.select_folder().then(path => {
                        if (path) {
                            const disp = document.getElementById('path-display');
                            disp.innerText = "> " + path;
                            disp.classList.remove('hidden');
                            disp.classList.add('text-green-400');
                            setTimeout(() => transitionContent(() => renderStep('credits')), 1000);
                        }
                    });
                } else {
                    const disp = document.getElementById('path-display');
                    disp.innerText = "> C:\\GAMES\\HALO_CE (MOCK)";
                    disp.classList.remove('hidden');
                    setTimeout(() => transitionContent(() => renderStep('credits')), 1000);
                }
                return;
            }

            // 2. POPUP ANTES DE REFINED
            if (actionName === 'installRefined') {
                showCustomModal(
                    text.modal_refined_title,
                    text.modal_refined_desc,
                    text.modal_btn_yes,
                    text.modal_btn_no,
                    () => { executeRealAction(actionName); }, // Si presiona "Sí, instalar"
                    () => { /* Si cancela, no hacemos nada */ }
                );
                return;
            }

            // Si es cualquier otra acción, ejecutar normalmente
            executeRealAction(actionName);
        }

        function skipStep(currentKey) {
            const idx = FLOW.indexOf(currentKey);
            if(idx > -1 && idx < FLOW.length - 1) transitionContent(() => renderStep(FLOW[idx + 1]));
        }

        function updateConsole(text) {
            const terminal = document.getElementById('terminal-logs');
            if(!terminal) return;
            const p = document.createElement('div');
            p.innerText = `> ${text}`;
            if(text.toLowerCase().includes('error')) p.style.color = 'var(--terminal-red)';
            if(text.toLowerCase().includes('ok') || text.toLowerCase().includes('complete') || text.toLowerCase().includes('correctamente') || text.toLowerCase().includes('successfully')) p.style.color = 'var(--terminal-green)';
            terminal.prepend(p);
        }

        function updateProgress(percent) {
            const fill = document.getElementById('progress-fill');
            const text = document.getElementById('progress-text');
            if(fill) fill.style.width = `${percent}%`;
            if(text) text.innerText = `${Math.round(percent)}%`;
        }

        function phaseComplete(stageNum) {
            isProcessing = false;
            setTimeout(() => {
                const idx = FLOW.indexOf(currentStepKey);
                if(idx > -1 && idx < FLOW.length - 1) transitionContent(() => renderStep(FLOW[idx + 1]));
            }, 1000);
        }

        function simulateProgress() {
            let p = 0;
            updateConsole("Simulating process...");
            showExtractionLoader(true);
            const int = setInterval(() => {
                p+=5; updateProgress(p);
                if(p >= 100) {
                    clearInterval(int);
                    showExtractionLoader(false);
                    updateConsole("Operation complete.");
                    phaseComplete(1); 
                }
            }, 100);
        }
    </script>
</body>
</html>
